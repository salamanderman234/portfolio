<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tresna Saputra | Fullstack Engineer</title>
    <meta name="description" content="A terminal-styled portfolio showcasing my projects and skills.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="terminal-dots">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div class="terminal-title">guest@visitor: ~</div>
        </div>
        <div class="terminal-body" id="terminal-body">
            <div class="output" id="output"></div>
            <div class="input-line">
                <span class="prompt">guest@visitor:~$</span>
                <input type="text" id="command-input" autofocus spellcheck="false" autocomplete="off">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
